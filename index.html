<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Luz Moreno Campos">
    <meta name="description" content="Fakebook">
    <meta name="keywords" content="posts, photos, social media, friends">
    <link rel="icon" href="./assets/media/favicon.jpg" type="image/x-icon">
    <link rel="stylesheet" href="./assets/styles/reset.css" media="all">
    <link rel="stylesheet" href="./assets/styles/index.css" media="all">
    <script src="./assets/scripts/script.js" defer type="module"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Fakebook</title>
  </head>

  <body>
    <div class="container">
      <header>
        <img class="logo" src="./assets/media/fakebook-logo.jpg">
        <div>
          <nav class="menu">
            <a href="#">Friends</a>
            <a href="#">Pages</a>
            <a href="#">Groups</a>
            <a href="#">My adds</a>
            <a href="#">Settings</a>
          </nav>
        </div>
        <div class="profile-info">
          <img class="profile-photo" id="header-photo" src="./assets/media/profile-photo.jpg" alt="Profile photo">
          <div class="dialog">
            <div id="profile-modal" class="profile-modal hidden">
              <div class="post-header">
                <img class="profile-photo" src="./assets/media/profile-photo.jpg" alt="Profile photo">
                <div class = "identity">
                  <span  id="modal-name"></span>
                  <span class="username" id ="user-modal"></span>
                </div>
              </div>
              <div class="section-divider">
                <p>Personal Info</p>
              </div>
              <div class="modal-row">
                <span class="label">Email: </span>
                <span class="value" id="modal-email"></span>
              </div>
              <div class="modal-row">
                <span class="label">User ID:</span>
                <span class="value" id="modal-id"></span>
              </div>
              <div class="section-divider">
                <p>Account Features</p>
              </div>
              <div class="modal-row">
                <span class="label">Can Monetize:</span>
                <span class="value" id="modal-monetize"></span>
              </div>
              <div class="section-divider">
                <p>My Pages</p>
              </div>
              <ul class="value" id="modal-pages"></ul>
              <div class="section-divider">
                <p>My Groups</p>
              </div>
              <ul class="value" id="modal-groups"></ul>
            </div>
          </div>
        </div>
      </header>
      <main>
        <div class="post-generator">
          <form>
            <textarea id="post-content" name="post" placeholder="What are you thinking?"></textarea>
            <div class="post-actions">
              <div class = "upload-container">
                <label for="upload" class="upload-icon">
                  <i class="fa-solid fa-image"></i>
                </label>
                <input type="file" id="upload" accept="image/*">
                <span id="file-name-display"></span>
              </div>
              <button id="post-btn" type="button">Post</button>
            </div>
          </form>
        </div>
        <div class="posts-feed"></div> 
      </main>
    </div>
  </body>
</html>
